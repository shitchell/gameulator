[workspace]
resolver = "2"
members = ["crates/pokegen1", "crates/app", "crates/cli", "crates/xtask"]

[workspace.package]
edition = "2021"
license = "MIT"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clap = { version = "4", features = ["derive"] }
anyhow = "1"
thiserror = "2"
